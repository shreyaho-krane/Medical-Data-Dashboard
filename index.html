<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Vital Signs Monitor</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #f0f7fc 0%, #dce8f0 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .dashboard {
      max-width: 950px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 2rem 2rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 20, 40, 0.15), 0 6px 12px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: all 0.2s ease;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 0.25rem;
    }

    h1 {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 1.9rem;
      color: #0b2b3f;
      letter-spacing: -0.5px;
    }

    h1 i {
      color: #c0395a;
    }

    .medical-badge {
      font-size: 0.7rem;
      background: #1a3a4a;
      color: #8fc7e0;
      padding: 4px 12px;
      border-radius: 40px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .subhead {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #3a5e74;
      font-weight: 400;
      font-size: 0.95rem;
      border-bottom: 1px solid rgba(60, 100, 130, 0.15);
      padding-bottom: 0.75rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 8px;
    }

    .subhead i {
      margin-right: 6px;
      color: #2b6c8c;
    }

    .badge-live {
      background: #d1e7f5;
      color: #065a7a;
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .badge-live i {
      color: #0f7b9e;
      font-size: 0.7rem;
    }

    .badge-auth {
      background: #e8f5e9;
      color: #1e6b3b;
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .badge-auth i {
      color: #2e7d4a;
    }

    .badge-status {
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .badge-status.idle {
      background: #e8eaf6;
      color: #3949ab;
    }

    .badge-status.idle i {
      color: #5c6bc0;
    }

    .badge-status.reading {
      background: #fff3e0;
      color: #e65100;
      animation: pulse-badge 1s infinite;
    }

    .badge-status.reading i {
      color: #f57c00;
    }

    .badge-status.success {
      background: #e8f5e9;
      color: #1e6b3b;
    }

    .badge-status.success i {
      color: #2e7d4a;
    }

    .badge-status.error {
      background: #ffebee;
      color: #c62828;
    }

    .badge-status.error i {
      color: #d32f2f;
    }

    .badge-status.warning {
      background: #fff8e1;
      color: #e65100;
    }

    .badge-status.warning i {
      color: #f57c00;
    }

    .badge-status.processing {
      background: #e3f2fd;
      color: #0d47a1;
      animation: pulse-badge 1s infinite;
    }

    .badge-status.processing i {
      color: #1565c0;
    }

    @keyframes pulse-badge {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1.5rem;
      margin-top: 0.5rem;
    }

    .metric-card {
      background: white;
      padding: 1.5rem 0.8rem 1.2rem;
      border-radius: 32px;
      box-shadow: 0 6px 16px rgba(0, 20, 30, 0.06);
      text-align: center;
      transition: all 0.15s ease;
      border: 1px solid rgba(200, 220, 235, 0.4);
      backdrop-filter: blur(4px);
      background: rgba(255, 255, 255, 0.7);
      position: relative;
      overflow: hidden;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: transparent;
      transition: all 0.3s ease;
    }

    .metric-card.updating::before {
      background: linear-gradient(90deg, #f39c12, #f1c40f, #f39c12);
      animation: shimmer 1.5s infinite;
    }

    .metric-card.updated::before {
      background: #27ae60;
    }

    .metric-card.failed::before {
      background: #e74c3c;
    }

    .metric-card.error-state {
      opacity: 0.6;
      border-color: #ffcdd2;
    }

    .metric-card.error-state .metric-value {
      color: #999 !important;
    }

    .metric-card.error-state .metric-status {
      background: #ffebee;
      color: #c62828;
    }

    .metric-card.processing-state {
      border-color: #90caf9;
      background: rgba(227, 242, 253, 0.3);
    }

    .metric-card.processing-state .metric-status {
      background: #e3f2fd;
      color: #0d47a1;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .metric-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 28px rgba(0, 30, 50, 0.10);
      border-color: #b4d2e6;
    }

    .metric-card .update-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 0.65rem;
      padding: 2px 10px;
      border-radius: 40px;
      background: #f5f5f5;
      color: #999;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .metric-card .update-indicator.show {
      opacity: 1;
    }

    .metric-card .update-indicator.success {
      background: #e8f5e9;
      color: #2e7d4a;
    }

    .metric-card .update-indicator.failed {
      background: #ffebee;
      color: #c62828;
    }

    .metric-card .update-indicator.updating {
      background: #fff3e0;
      color: #e65100;
    }

    .metric-icon {
      font-size: 2.2rem;
      margin-bottom: 0.4rem;
      display: inline-block;
      background: rgba(60, 130, 180, 0.08);
      width: 60px;
      height: 60px;
      line-height: 60px;
      border-radius: 30px;
      color: #1b5e7a;
    }

    .metric-label {
      font-weight: 500;
      color: #1e4a62;
      letter-spacing: 0.3px;
      font-size: 0.9rem;
      text-transform: uppercase;
      opacity: 0.7;
      margin-top: 6px;
    }

    .metric-value {
      font-weight: 700;
      font-size: 2.2rem;
      color: #052433;
      line-height: 1.2;
      margin-top: 4px;
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
    }

    .metric-value .blink {
      animation: blink-data 0.5s ease 3;
    }

    .metric-value .error-placeholder {
      font-size: 1rem;
      color: #c62828;
      font-weight: 500;
    }

    .metric-value .processing-placeholder {
      font-size: 1rem;
      color: #0d47a1;
      font-weight: 500;
    }

    @keyframes blink-data {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .metric-unit {
      font-weight: 400;
      font-size: 1rem;
      color: #4f7991;
      margin-left: 2px;
    }

    .metric-status {
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 40px;
      display: inline-block;
      margin-top: 10px;
      background: #e7f0f7;
      color: #1b5d7a;
      font-weight: 500;
    }

    .glucose .metric-icon { color: #b45f3b; background: rgba(180, 95, 59, 0.10); }
    .heart .metric-icon { color: #c0395a; background: rgba(192, 57, 90, 0.10); }
    .spo2 .metric-icon { color: #2d7a9b; background: rgba(45, 122, 155, 0.10); }
    .temp .metric-icon { color: #d9772b; background: rgba(217, 119, 43, 0.10); }

    .glucose .metric-value { color: #9e5d3a; }
    .heart .metric-value { color: #b13e5a; }
    .spo2 .metric-value { color: #1f6d8f; }
    .temp .metric-value { color: #c5752e; }

    .action-section {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(80, 130, 165, 0.15);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .trigger-btn {
      background: linear-gradient(135deg, #1a5276, #154360);
      color: white;
      border: none;
      padding: 16px 40px;
      border-radius: 60px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(26, 82, 118, 0.35);
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.15);
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .trigger-btn i {
      font-size: 1.2rem;
    }

    .trigger-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(26, 82, 118, 0.45);
      background: linear-gradient(135deg, #1a5f8a, #154360);
    }

    .trigger-btn:active {
      transform: translateY(0px);
    }

    .trigger-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .trigger-btn.assessing {
      background: linear-gradient(135deg, #f39c12, #d68910);
      box-shadow: 0 4px 20px rgba(243, 156, 18, 0.4);
      animation: pulse-btn 1.5s infinite;
    }

    @keyframes pulse-btn {
      0% { box-shadow: 0 4px 20px rgba(243, 156, 18, 0.4); }
      50% { box-shadow: 0 4px 35px rgba(243, 156, 18, 0.7); }
      100% { box-shadow: 0 4px 20px rgba(243, 156, 18, 0.4); }
    }

    .trigger-btn.success {
      background: linear-gradient(135deg, #27ae60, #1e8449);
      box-shadow: 0 4px 20px rgba(39, 174, 96, 0.4);
    }

    .trigger-btn.error {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      box-shadow: 0 4px 20px rgba(231, 76, 60, 0.4);
    }

    .trigger-btn.warning {
      background: linear-gradient(135deg, #f39c12, #e67e22);
      box-shadow: 0 4px 20px rgba(243, 156, 18, 0.4);
    }

    .trigger-btn.processing {
      background: linear-gradient(135deg, #1565c0, #0d47a1);
      box-shadow: 0 4px 20px rgba(21, 101, 192, 0.4);
      animation: pulse-btn-processing 1.5s infinite;
    }

    @keyframes pulse-btn-processing {
      0% { box-shadow: 0 4px 20px rgba(21, 101, 192, 0.4); }
      50% { box-shadow: 0 4px 35px rgba(21, 101, 192, 0.7); }
      100% { box-shadow: 0 4px 20px rgba(21, 101, 192, 0.4); }
    }

    .footer-ref {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #44758d;
      text-align: center;
      border-top: 1px solid rgba(80, 130, 165, 0.15);
      padding-top: 1rem;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-ref i {
      margin-right: 6px;
      opacity: 0.7;
    }

    .update-log {
      margin-top: 0.8rem;
      padding: 0.8rem 1.2rem;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 16px;
      border: 1px solid rgba(200, 220, 235, 0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: #2c5a70;
      min-height: 50px;
      transition: all 0.3s ease;
    }

    .update-log i {
      font-size: 1rem;
    }

    .update-log .log-message {
      flex: 1;
    }

    .update-log .log-time {
      font-size: 0.7rem;
      opacity: 0.6;
    }

    .update-log.error {
      border-left: 4px solid #e74c3c;
      background: rgba(231, 76, 60, 0.05);
    }

    .update-log.warning {
      border-left: 4px solid #f39c12;
      background: rgba(243, 156, 18, 0.05);
    }

    .update-log.success {
      border-left: 4px solid #27ae60;
      background: rgba(39, 174, 96, 0.05);
    }

    .update-log.processing {
      border-left: 4px solid #1565c0;
      background: rgba(21, 101, 192, 0.05);
    }

    .loading-placeholder {
      text-align: center;
      padding: 3rem 0.5rem;
      color: #1a4c66;
      font-weight: 400;
    }

    .loading-placeholder i {
      font-size: 2.4rem;
      margin-bottom: 16px;
      opacity: 0.5;
      display: block;
    }

    .auth-error {
      background: #ffebee;
      border: 1px solid #ffcdd2;
      border-radius: 16px;
      padding: 1.5rem;
      color: #b71c1c;
      text-align: center;
    }

    .error-banner {
      border-radius: 16px;
      padding: 1.2rem 1.5rem;
      margin: 1rem 0;
      display: flex;
      align-items: center;
      gap: 16px;
      animation: slideDown 0.5s ease;
    }

    .error-banner.error {
      border: 2px solid #e74c3c;
      background: #ffebee;
    }

    .error-banner.warning {
      border: 2px solid #f39c12;
      background: #fff8e1;
    }

    .error-banner.success {
      border: 2px solid #27ae60;
      background: #e8f5e9;
    }

    .error-banner.processing {
      border: 2px solid #1565c0;
      background: #e3f2fd;
    }

    .error-banner i {
      font-size: 2rem;
    }

    .error-banner.error i {
      color: #c62828;
    }

    .error-banner.warning i {
      color: #e65100;
    }

    .error-banner.success i {
      color: #2e7d4a;
    }

    .error-banner.processing i {
      color: #1565c0;
    }

    .error-banner .error-content {
      flex: 1;
    }

    .error-banner .error-title {
      font-weight: 700;
      font-size: 1rem;
      color: #1a1a1a;
    }

    .error-banner .error-details {
      font-size: 0.9rem;
      color: #555;
      margin-top: 2px;
    }

    .error-banner .error-time {
      font-size: 0.7rem;
      color: #888;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1e3a5f;
      color: white;
      padding: 16px 24px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.4s ease;
      z-index: 1000;
      max-width: 400px;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: #1e8449;
    }

    .toast.error {
      background: #c0392b;
    }

    .toast.warning {
      background: #d68910;
    }

    .toast.processing {
      background: #1565c0;
    }

    .toast i {
      font-size: 1.2rem;
    }

    .command-status-display {
      margin-top: 0.8rem;
      padding: 0.8rem 1.2rem;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      border: 1px dashed rgba(80, 130, 165, 0.2);
      font-size: 0.8rem;
      color: #44758d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .command-status-display .label {
      font-weight: 600;
      opacity: 0.7;
    }

    .command-status-display .value {
      font-weight: 500;
      color: #1a4c66;
      font-family: 'Courier New', monospace;
    }

    .command-status-display .value.error {
      color: #c62828;
    }

    .command-status-display .value.success {
      color: #2e7d4a;
    }

    .command-status-display .value.warning {
      color: #e65100;
    }

    .command-status-display .value.processing {
      color: #0d47a1;
    }

    .data-status {
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 40px;
      margin-left: 8px;
    }

    .data-status.valid {
      background: #e8f5e9;
      color: #2e7d4a;
    }

    .data-status.invalid {
      background: #ffebee;
      color: #c62828;
    }

    .data-status.processing {
      background: #e3f2fd;
      color: #0d47a1;
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: stretch;
      }
      .trigger-btn {
        justify-content: center;
        padding: 14px 24px;
        font-size: 0.9rem;
        width: 100%;
      }
      .dashboard { padding: 1.5rem; }
      .metric-value { font-size: 1.8rem; }
      .metrics-grid { gap: 1rem; }
      .toast {
        bottom: 20px;
        right: 20px;
        left: 20px;
      }
      .subhead {
        flex-direction: column;
        align-items: flex-start;
      }
      .action-section {
        flex-direction: column;
      }
      .error-banner {
        flex-direction: column;
        text-align: center;
      }
      .command-status-display {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard" id="dashboard">
    <div class="header">
      <h1>
        <i class="fas fa-heartbeat"></i> 
        Patient Monitor
        <span class="medical-badge">VITAL SIGNS</span>
      </h1>
    </div>

    <div class="subhead">
      <span><i class="fas fa-database"></i> Firebase Realtime · live</span>
      <span style="display: flex; gap: 8px; flex-wrap: wrap;">
        <span class="badge-auth"><i class="fas fa-lock"></i> authenticated</span>
        <span class="badge-status idle" id="assessmentStatus">
          <i class="fas fa-clock"></i> standby
        </span>
        <span class="badge-live"><i class="fas fa-circle" style="color:#0d8f4b;"></i> connected</span>
      </span>
    </div>

    <!-- Error Banner -->
    <div id="errorBanner" style="display: none;"></div>

    <!-- Metrics Grid -->
    <div id="metricsContainer" class="metrics-grid">
      <div class="loading-placeholder" style="grid-column: 1 / -1;">
        <i class="fas fa-spinner fa-pulse"></i>
        <span>Loading patient data…</span>
      </div>
    </div>

    <!-- Command Status Display -->
    <div class="command-status-display" id="commandStatusDisplay">
      <span>
        <span class="label"><i class="fas fa-terminal"></i> Last Command Status:</span>
        <span class="value" id="commandStatusValue">—</span>
      </span>
      <span>
        <span class="label">Timestamp:</span>
        <span class="value" id="commandTimestampValue">—</span>
      </span>
      <span>
        <span class="label">Data:</span>
        <span class="data-status valid" id="dataStatusDisplay">✓ Valid</span>
      </span>
    </div>

    <!-- Action Section -->
    <div class="action-section">
      <button class="trigger-btn" id="triggerBtn">
        <i class="fas fa-stethoscope"></i>
        Initiate Assessment
      </button>
    </div>

    <!-- Update log -->
    <div class="update-log" id="updateLog">
      <i class="fas fa-clipboard-list"></i>
      <span class="log-message" id="logMessage">System ready. Awaiting assessment.</span>
      <span class="log-time" id="logTime">—</span>
    </div>

    <div class="footer-ref">
      <span><i class="fas fa-microscope"></i> Glucose · Heart Rate · SpO₂ · Temperature</span>
      <span><i class="far fa-clock"></i> <span id="lastUpdate">waiting for data…</span></span>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast">
    <i class="fas fa-info-circle"></i>
    <span id="toastMessage">Notification</span>
  </div>

  <!-- Firebase SDKs -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, onValue, set } from "firebase/database";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "firebase/auth";

    // Firebase configuration
    const firebaseConfig = {

    // ----- Create metric card -----
    function createMetricCard(iconClass, label, value, unit, statusText, cardClass, metricKey, state = 'normal') {
      const card = document.createElement('div');
      card.className = `metric-card ${cardClass || ''}`;
      card.dataset.metric = metricKey;
      
      if (state === 'error') {
        card.classList.add('error-state');
      } else if (state === 'processing') {
        card.classList.add('processing-state');
      }
      
      let displayValue = value;
      if (typeof value === 'number') {
        displayValue = Number.isInteger(value) ? value : value.toFixed(2);
      } else if (value === undefined || value === null || value === '—') {
        displayValue = '—';
      }

      let valueHTML = '';
      if (state === 'error') {
        valueHTML = `<span class="error-placeholder"><i class="fas fa-times-circle"></i> No Data</span>`;
      } else if (state === 'processing') {
        valueHTML = `<span class="processing-placeholder"><i class="fas fa-spinner fa-spin"></i> Processing</span>`;
      } else {
        valueHTML = `${displayValue} <span class="metric-unit">${unit || ''}</span>`;
      }

      let statusTextDisplay = statusText || '—';
      if (state === 'error') statusTextDisplay = '⚠️ Error';
      else if (state === 'processing') statusTextDisplay = '⏳ Processing';

      card.innerHTML = `
        <div class="update-indicator" id="indicator-${metricKey}">✓</div>
        <div class="metric-icon"><i class="${iconClass}"></i></div>
        <div class="metric-label">${label}</div>
        <div class="metric-value" id="value-${metricKey}">
          ${valueHTML}
        </div>
        <div class="metric-status">${statusTextDisplay}</div>
      `;
      return card;
    }

    // ----- Show update indicator -----
    function showUpdateIndicator(metricKey, status) {
      const indicator = document.getElementById(`indicator-${metricKey}`);
      const card = indicator?.closest('.metric-card');
      if (!indicator || !card) return;

      card.classList.remove('updating', 'updated', 'failed');
      indicator.classList.remove('show', 'success', 'failed', 'updating');

      if (status === 'updating') {
        card.classList.add('updating');
        indicator.classList.add('show', 'updating');
        indicator.textContent = '⟳';
      } else if (status === 'success') {
        card.classList.add('updated');
        indicator.classList.add('show', 'success');
        indicator.textContent = '✓';
        setTimeout(() => {
          indicator.classList.remove('show');
          card.classList.remove('updated');
        }, 3000);
      } else if (status === 'failed') {
        card.classList.add('failed');
        indicator.classList.add('show', 'failed');
        indicator.textContent = '✗';
        setTimeout(() => {
          indicator.classList.remove('show');
          card.classList.remove('failed');
        }, 4000);
      }
    }

    // ----- Render metrics -----
    function renderMetrics(data, state = 'normal') {
      container.innerHTML = '';

      // If state is error or processing, show placeholder cards
      if (state === 'error') {
        const errorCards = [
          { key: 'glucose', label: 'Glucose', icon: 'fas fa-droplet', cardClass: 'glucose' },
          { key: 'heartRate', label: 'Heart Rate', icon: 'fas fa-heart', cardClass: 'heart' },
          { key: 'spo2', label: 'SpO₂', icon: 'fas fa-lungs', cardClass: 'spo2' },
          { key: 'temperature', label: 'Temperature', icon: 'fas fa-thermometer-half', cardClass: 'temp' }
        ];

        errorCards.forEach(({ key, label, icon, cardClass }) => {
          const card = createMetricCard(
            icon,
            label,
            '—',
            '',
            'No Data',
            cardClass,
            key,
            'error'
          );
          container.appendChild(card);
        });

        updateDataStatus(false, 'invalid');
        return;
      }

      if (state === 'processing') {
        const processingCards = [
          { key: 'glucose', label: 'Glucose', icon: 'fas fa-droplet', cardClass: 'glucose' },
          { key: 'heartRate', label: 'Heart Rate', icon: 'fas fa-heart', cardClass: 'heart' },
          { key: 'spo2', label: 'SpO₂', icon: 'fas fa-lungs', cardClass: 'spo2' },
          { key: 'temperature', label: 'Temperature', icon: 'fas fa-thermometer-half', cardClass: 'temp' }
        ];

        processingCards.forEach(({ key, label, icon, cardClass }) => {
          const card = createMetricCard(
            icon,
            label,
            '—',
            '',
            'Processing',
            cardClass,
            key,
            'processing'
          );
          container.appendChild(card);
        });

        updateDataStatus(false, 'processing');
        return;
      }

      // Normal rendering with data
      if (!data || typeof data !== 'object') {
        container.innerHTML = `<div class="loading-placeholder" style="grid-column:1/-1;">
          <i class="fas fa-exclamation-triangle"></i>
          <span>No patient data available</span>
        </div>`;
        updateDataStatus(false, 'invalid');
        return;
      }

      const glucose = data.glucose ?? '—';
      const heartRate = data.heartRate ?? '—';
      const spo2 = data.spo2 ?? '—';
      const temperature = data.temperature ?? '—';

      // Detect changes
      const changes = {};
      if (previousValues.glucose !== undefined && previousValues.glucose !== glucose) {
        changes.glucose = { old: previousValues.glucose, new: glucose };
      }
      if (previousValues.heartRate !== undefined && previousValues.heartRate !== heartRate) {
        changes.heartRate = { old: previousValues.heartRate, new: heartRate };
      }
      if (previousValues.spo2 !== undefined && previousValues.spo2 !== spo2) {
        changes.spo2 = { old: previousValues.spo2, new: spo2 };
      }
      if (previousValues.temperature !== undefined && previousValues.temperature !== temperature) {
        changes.temperature = { old: previousValues.temperature, new: temperature };
      }

      previousValues = { glucose, heartRate, spo2, temperature };

      const cards = [];

      cards.push(createMetricCard(
        'fas fa-droplet',
        'Glucose',
        glucose,
        'mg/dL',
        glucose !== '—' ? (glucose < 100 ? 'Normal' : glucose < 140 ? 'Elevated' : 'High') : '—',
        'glucose',
        'glucose',
        'normal'
      ));

      let hrStatus = '—';
      if (heartRate !== '—') {
        if (heartRate < 60) hrStatus = 'Bradycardia';
        else if (heartRate <= 100) hrStatus = 'Normal';
        else hrStatus = 'Tachycardia';
      }
      cards.push(createMetricCard(
        'fas fa-heart',
        'Heart Rate',
        heartRate,
        'bpm',
        hrStatus,
        'heart',
        'heartRate',
        'normal'
      ));

      let spo2Status = '—';
      if (spo2 !== '—') {
        if (spo2 >= 95) spo2Status = 'Optimal';
        else if (spo2 >= 90) spo2Status = 'Acceptable';
        else spo2Status = 'Low';
      }
      cards.push(createMetricCard(
        'fas fa-lungs',
        'SpO₂',
        spo2,
        '%',
        spo2Status,
        'spo2',
        'spo2',
        'normal'
      ));

      let tempStatus = '—';
      if (temperature !== '—') {
        const t = Number(temperature);
        if (!isNaN(t)) {
          if (t < 36.0) tempStatus = 'Low';
          else if (t <= 37.5) tempStatus = 'Normal';
          else tempStatus = 'Fever';
        }
      }
      cards.push(createMetricCard(
        'fas fa-thermometer-half',
        'Temperature',
        temperature,
        '°C',
        tempStatus,
        'temp',
        'temperature',
        'normal'
      ));

      cards.forEach(card => container.appendChild(card));

      Object.keys(changes).forEach(key => {
        showUpdateIndicator(key, 'success');
        const valueEl = document.getElementById(`value-${key}`);
        if (valueEl) {
          valueEl.classList.remove('blink');
          void valueEl.offsetWidth;
          valueEl.classList.add('blink');
        }
      });

      const now = new Date();
      lastUpdateSpan.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      
      if (Object.keys(changes).length > 0) {
        const changedKeys = Object.keys(changes).join(', ');
        updateLog(`📊 ${changedKeys} updated`, 'success');
      }

      updateDataStatus(true, 'valid');
    }

    // ----- Handle status from hardware -----
    function handleHardwareStatus(status, commandData = null) {
      // Prevent duplicate handling
      if (lastProcessedStatus === status && commandData?.timestamp === lastProcessedStatus) {
        console.log('Duplicate status ignored:', status);
        return;
      }

      console.log('Processing hardware status:', status);

      // Update the command status display
      updateCommandDisplay(status, commandData?.timestamp);

      // Store the processed status
      lastProcessedStatus = status;

      // Get status definition
      const statusDef = STATUS_TYPES[status];
      
      if (!statusDef) {
        // Unknown status - treat as processing
        console.log('Unknown status, treating as processing:', status);
        handleProcessingStatus(status, commandData);
        return;
      }

      const type = statusDef.type;

      // Handle based on type
      if (type === 'processing') {
        handleProcessingStatus(status, commandData);
      } else if (type === 'success') {
        handleSuccessStatus(status, commandData);
      } else {
        handleErrorStatus(status, commandData);
      }
    }

    // ----- Handle processing status -----
    function handleProcessingStatus(status, commandData = null) {
      const statusDef = STATUS_TYPES[status] || STATUS_TYPES['processing'];
      
      // Show processing state
      isProcessing = true;
      renderMetrics(null, 'processing');
      
      triggerBtn.className = `trigger-btn ${statusDef.buttonClass || 'processing'}`;
      triggerBtn.innerHTML = `<i class="fas ${statusDef.icon}"></i> ${statusDef.title}`;
      
      setAssessmentStatus(statusDef.badgeState || 'processing', statusDef.title.toLowerCase());
      updateLog(`⏳ ${statusDef.title}: ${statusDef.details}`, statusDef.logType || 'processing');
      showToast(`⏳ ${statusDef.title}`, 'processing');
      showBanner(status, commandData?.message || statusDef.details);
    }

    // ----- Handle success status -----
    function handleSuccessStatus(status, commandData = null) {
      const statusDef = STATUS_TYPES[status] || STATUS_TYPES['success'];
      
      hasHandledResponse = true;
      isProcessing = false;
      
      // Show the data
      if (currentData) {
        renderMetrics(currentData, 'normal');
      }
      
      hideBanner();
      
      triggerBtn.className = `trigger-btn ${statusDef.buttonClass || 'success'}`;
      triggerBtn.innerHTML = `<i class="fas ${statusDef.icon}"></i> ${statusDef.title}`;
      
      setAssessmentStatus(statusDef.badgeState || 'success', statusDef.title.toLowerCase());
      updateLog(`✅ ${statusDef.title}: ${statusDef.details}`, statusDef.logType || 'success');
      showToast(`✅ ${statusDef.title}`, 'success');
      showBanner(status, commandData?.message || statusDef.details);
      
      updateDataStatus(true, 'valid');
      
      setTimeout(() => {
        resetTriggerButton();
      }, 3000);
    }

    // ----- Handle error status -----
    function handleErrorStatus(status, commandData = null) {
      const statusDef = STATUS_TYPES[status] || STATUS_TYPES['sensor_error'];
      
      hasHandledResponse = true;
      isProcessing = false;
      
      // Show error state - NO DATA
      renderMetrics(null, 'error');
      
      triggerBtn.className = `trigger-btn ${statusDef.buttonClass || 'error'}`;
      triggerBtn.innerHTML = `<i class="fas ${statusDef.icon}"></i> ${statusDef.title}`;
      
      setAssessmentStatus(statusDef.badgeState || 'error', statusDef.title.toLowerCase());
      
      const logDetail = commandData?.message || statusDef.details;
      updateLog(`❌ ${statusDef.title}: ${logDetail}`, statusDef.logType || 'error');
      
      showToast(`❌ ${statusDef.title}`, statusDef.type || 'error');
      showBanner(status, commandData?.message || statusDef.details);
      
      updateDataStatus(false, 'invalid');
      
      setTimeout(() => {
        resetTriggerButton();
      }, 5000);
    }

    // ----- Trigger assessment -----
    function triggerAssessment() {
      if (isAssessing) return;
      isAssessing = true;
      hasHandledResponse = false;
      lastProcessedStatus = null;
      isProcessing = false;

      hideBanner();

      triggerBtn.disabled = true;
      triggerBtn.className = 'trigger-btn assessing';
      triggerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Assessing…';
      setAssessmentStatus('reading', 'assessing vitals…');
      updateLog('🔄 Initiating patient assessment…', null);

      // Show processing state on cards
      renderMetrics(null, 'processing');

      const triggerRef = ref(database, 'commands/readNow');
      
      set(triggerRef, {
        timestamp: Date.now(),
        status: 'pending',
        requestedBy: 'dashboard',
        type: 'full_assessment'
      })
      .then(() => {
        showToast('📡 Assessment command sent to device', 'success');
        updateLog('📡 Assessment command sent. Waiting for response…', null);
        
        updateCommandDisplay('pending', Date.now());
        
        // Timeout after 25 seconds
        let timeoutId = setTimeout(() => {
          if (isAssessing && !hasHandledResponse) {
            handleHardwareStatus('timeout');
            
            if (triggerBtn._timeoutId) {
              clearTimeout(triggerBtn._timeoutId);
              triggerBtn._timeoutId = null;
            }
          }
        }, 25000);

        triggerBtn._timeoutId = timeoutId;
      })
      .catch((error) => {
        console.error('Trigger error:', error);
        if (!hasHandledResponse) {
          handleHardwareStatus('sensor_error', { message: `Failed to send command: ${error.message}` });
        }
      });
    }

    // ----- Reset trigger button -----
    function resetTriggerButton() {
      isAssessing = false;
      isProcessing = false;
      triggerBtn.disabled = false;
      triggerBtn.className = 'trigger-btn';
      triggerBtn.innerHTML = '<i class="fas fa-stethoscope"></i> Initiate Assessment';
      
      if (!assessmentStatus.classList.contains('success')) {
        setAssessmentStatus('idle', 'standby');
      }
      
      if (triggerBtn._timeoutId) {
        clearTimeout(triggerBtn._timeoutId);
        triggerBtn._timeoutId = null;
      }
    }

    // ----- Listen to Firebase realtime updates -----
    function startDataListener() {
      const metricsRef = ref(database, 'health_metrics');
      const commandsRef = ref(database, 'commands/readNow');
      
      // Listen for command status changes
      onValue(commandsRef, (snapshot) => {
        const command = snapshot.val();
        
        if (!command) {
          updateCommandDisplay('—', null);
          // If not assessing, show last known data
          if (!isAssessing && !isProcessing && currentData) {
            renderMetrics(currentData, 'normal');
          }
          return;
        }
        
        console.log('Command data received:', command);
        updateCommandDisplay(command.status || '—', command.timestamp);
        
        // Only process if we're in assessing state
        if (isAssessing && command.status) {
          const status = command.status;
          
          if (lastProcessedStatus === status && command.timestamp === lastProcessedStatus) {
            return;
          }
          
          handleHardwareStatus(status, command);
        }
      }, (error) => {
        console.error('Command listener error:', error);
      });

      // Listen for health metrics updates
      onValue(metricsRef, (snapshot) => {
        const data = snapshot.val();
        currentData = data;
        
        // Only update if not in error or processing state
        const hasError = assessmentStatus.classList.contains('error') || 
                        assessmentStatus.classList.contains('warning');
        
        if (!hasError && !isProcessing && !isAssessing) {
          renderMetrics(data, 'normal');
        } else if (!hasError && isProcessing) {
          // Don't overwrite processing state
        } else if (!hasError && isAssessing && !isProcessing) {
          // If assessing but not processing, show data if available
          if (data && Object.keys(data).length > 0) {
            renderMetrics(data, 'normal');
          }
        }
      }, (error) => {
        console.error('Firebase read error:', error);
        if (error.code === 'PERMISSION_DENIED') {
          showAuthError('Permission denied. Please verify your credentials.');
        } else {
          container.innerHTML = `
            <div class="loading-placeholder" style="grid-column:1/-1; color:#b34a4a;">
              <i class="fas fa-exclamation-circle"></i>
              <span>Error: ${error.message}</span>
            </div>`;
          lastUpdateSpan.textContent = 'error';
          updateLog('⚠️ Database error: ' + error.message, 'error');
        }
      });
    }

    // ----- Authentication -----
    function authenticateUser() {
      container.innerHTML = `
        <div class="loading-placeholder" style="grid-column: 1 / -1;">
          <i class="fas fa-spinner fa-pulse"></i>
          <span>Authenticating…</span>
        </div>
      `;

      signInWithEmailAndPassword(auth, EMAIL, PASSWORD)
        .then((userCredential) => {
          console.log('✅ Authenticated:', userCredential.user.email);
          startDataListener();
          triggerBtn.disabled = false;
        })
        .catch((error) => {
          console.error('❌ Auth error:', error.code, error.message);
          showAuthError(`Failed to authenticate: ${error.message}`);
          triggerBtn.disabled = true;
          updateLog('❌ Authentication failed', 'error');
        });
    }

    // ----- Auth state observer -----
    onAuthStateChanged(auth, (user) => {
      if (user) {
        console.log('✅ Already authenticated:', user.email);
        startDataListener();
        triggerBtn.disabled = false;
      } else {
        console.log('🔄 Attempting auto-login…');
        authenticateUser();
      }
    });

    // ----- Trigger button event listener -----
    triggerBtn.addEventListener('click', triggerAssessment);

    console.log('🏥 Patient Vital Signs Monitor ready');
    updateLog('🏥 System ready. Awaiting assessment.', null);
  </script>
</body>
</html>
